<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNH Blindada - Originals</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-dark-grey: #181818;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body { background-color: var(--netflix-black); display: flex; color: #fff; overflow-x: hidden; }

        /* --- SIDEBAR ESTILO DARK --- */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; 
            background-color: #000;
            position: fixed; transition: all 0.3s ease;
            z-index: 1000; display: flex; flex-direction: column;
            border-right: 1px solid #333; 
        }

        .logo-area { padding: 40px 20px; text-align: center; }
        .logo-area img { max-width: 140px; height: auto; filter: drop-shadow(0 0 5px rgba(229, 9, 20, 0.2)); }

        .nav-menu { flex-grow: 1; padding: 10px; }
        
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px; margin-bottom: 5px;
            color: #b3b3b3; 
            text-decoration: none; border-radius: 4px; transition: 0.2s; 
            font-weight: 400; cursor: pointer; font-size: 0.9rem;
        }
        
        .nav-item i { margin-right: 15px; font-size: 1.1rem; width: 20px; text-align: center; }
        
        .nav-item:hover, .nav-item.active { 
            background-color: rgba(255,255,255,0.1); 
            color: #fff; 
        }

        .nav-item.active { border-left: 4px solid var(--netflix-red); padding-left: 11px; }

        .sidebar-status { 
            padding: 20px; 
            background: var(--netflix-dark-grey); 
            margin: 10px; 
            border-radius: 4px; 
        }
        .status-title { font-size: 0.65rem; color: #808080; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block;}
        .status-badge { display: flex; align-items: center; gap: 8px; color: var(--netflix-red); font-weight: bold; font-size: 0.85rem; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { margin-left: var(--sidebar-width); width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

        header {
            height: 70px; background: rgba(20, 20, 20, 0.95); padding: 0 30px; display: flex;
            align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 900;
        }

        .btn-mobile { display: none; font-size: 1.5rem; cursor: pointer; color: #fff; }

        #content-frame-container { flex-grow: 1; display: none; width: 100%; height: calc(100vh - 70px); background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* DASHBOARD CARDS */
        .dashboard-grid { padding: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card {
            background: var(--netflix-dark-grey); border-radius: 4px; overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer; position: relative;
            border-bottom: 3px solid transparent; padding-bottom: 15px;
        }

        .card:hover { 
            transform: scale(1.05); 
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            border-bottom-color: var(--netflix-red);
        }

        .card-image {
            height: 160px; background: linear-gradient(45deg, #222, #333);
            display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--netflix-red);
        }

        .card-body { padding: 20px; }
        .card h3 { margin-bottom: 8px; font-size: 1.1rem; color: #fff; }
        .card p { color: #808080; font-size: 0.85rem; line-height: 1.4; }

        /* BADGE CONTINUAR */
        .badge-netflix {
            background: var(--netflix-red); color: white; padding: 2px 8px; 
            font-size: 0.7rem; font-weight: bold; border-radius: 2px;
            position: absolute; top: 10px; left: 10px;
        }

        @media (max-width: 768px) {
            .sidebar { left: -100%; }
            .sidebar.show { left: 0; }
            .main-content { margin-left: 0; }
            .btn-mobile { display: block; }
            .dashboard-grid { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <img src="cnh.png" alt="CNH Blindada">
        </div>
        
        <nav class="nav-menu">
            <div onclick="openHome()" class="nav-item active" id="menu-painel"><i class="fas fa-home"></i> Início</div>
            
            <div onclick="loadPage('plano-estudo.html')" class="nav-item"><i class="fas fa-list-ul"></i> Minha Lista</div>
            
            <div onclick="loadPage('aula-ao-vivo.html')" class="nav-item"><i class="fas fa-video"></i> Ao Vivo</div>
            
            <div onclick="loadPage('listas_gravadas.html')" class="nav-item"><i class="fas fa-film"></i> Aulas Gravadas</div>
            
            <div onclick="loadPage('lista-simulados.html')" class="nav-item"><i class="fas fa-check-circle"></i> Simulados</div>
            
            <div onclick="loadPage('material.html')" class="nav-item"><i class="fas fa-file-alt"></i> Materiais</div>
            
            <div onclick="loadPage('suporte.html')" class="nav-item"><i class="fas fa-info-circle"></i> Ajuda</div>
        </nav>

        <div class="sidebar-status">
            <span class="status-title">Assinatura</span>
            <div class="status-badge">
                <i class="fas fa-crown"></i>
                <span>ACESSAR PREMIUM</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <div class="btn-mobile" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="user-profile">
                <span style="font-size: 0.9rem; color: #e5e5e5;">Bem-vindo, <strong style="color: #fff;">Aluno</strong></span>
            </div>
        </header>

        <section id="view-home" class="dashboard-grid">
            <div class="card" onclick="loadPage('listas_gravadas.html')">
                <span class="badge-netflix">CONTINUAR</span>
                <div class="card-image"><i class="fas fa-play"></i></div>
                <div class="card-body">
                    <h3>Continuar Assistindo</h3>
                    <p>Módulo 01: Processo de Habilitação</p>
                </div>
            </div>

            <div class="card" onclick="loadPage('lista-simulados.html')">
                <div class="card-image" style="color: #46d369;"><i class="fas fa-edit"></i></div>
                <div class="card-body">
                    <h3>Simulados</h3>
                    <p>Treine seus conhecimentos com testes rápidos.</p>
                </div>
            </div>

            <div class="card" onclick="loadPage('material.html')">
                <div class="card-image" style="color: #54b4ff;"><i class="fas fa-arrow-alt-circle-down"></i></div>
                <div class="card-body">
                    <h3>Downloads</h3>
                    <p>Apostilas e PDFs para estudar offline.</p>
                </div>
            </div>
        </section>

        <div id="content-frame-container">
            <iframe src="" id="main-frame" title="Conteúdo"></iframe>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }

        function loadPage(url) {
            const home = document.getElementById('view-home');
            const frameContainer = document.getElementById('content-frame-container');
            const frame = document.getElementById('main-frame');

            home.style.display = 'none';
            frameContainer.style.display = 'block';
            frame.src = url; 

            // Gerenciamento de classes ativas no menu
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            
            // Tenta marcar o item ativo pelo clique
            if (event && event.currentTarget && event.currentTarget.classList.contains('nav-item')) {
                event.currentTarget.classList.add('active');
            }

            if(window.innerWidth <= 768) toggleSidebar();
        }

        function openHome() {
            document.getElementById('view-home').style.display = 'grid';
            document.getElementById('content-frame-container').style.display = 'none';
            document.getElementById('main-frame').src = "";
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('menu-painel').classList.add('active');
            if(window.innerWidth <= 768) toggleSidebar();
        }
    </script>
</body>
</html>
