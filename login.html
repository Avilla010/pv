<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CNH Blindada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a; 
            --accent-color: #fbbf24;  
            --bg-body: #f1f5f9;       
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-login img {
            max-width: 180px;
            margin-bottom: 20px;
        }

        h2 { color: var(--primary-color); margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative; /* Necessário para posicionar o ícone */
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 15px; /* Espaço extra na direita para o ícone */
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        /* Estilo do Ícone de Olho */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px; /* Ajustado para alinhar com o input abaixo da label */
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
        }

        #error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-login">
            <img src="cnh.png" alt="CNH Blindada">
        </div>
        <h2>Área do Aluno</h2>
        <p>Acesse sua plataforma de ensino</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Seu usuário" required>
            </div>
            
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
                <i class="fas fa-eye toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
            </div>

            <button type="submit" class="btn-login">Entrar na Plataforma</button>
            <div id="error-msg">Usuário ou senha incorretos!</div>
        </form>
    </div>

    <script>
        // Função para mostrar/esconder a senha
        function togglePasswordVisibility() {
            const passwordField = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            // Credenciais que você definiu
            if (user === 'digital07' && pass === 'digital07') {
                localStorage.setItem('acesso_cnh', 'true'); 
                window.location.href = 'menu.html'; 
            } else {
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
