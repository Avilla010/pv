<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consolidador de Carteira - B3</title>
    
    <!-- Configurações para rodar igual a um Aplicativo Nativo no Android (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Ícone Local configurado para Navegador e Instalação no Android -->
    <link rel="icon" type="image/x-icon" href="b3.ico">
    <link rel="apple-touch-icon" href="b3.ico">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-header: #2a2a2a;
            --border-color: #2d2d2d;
            --accent-color: #00ff88;
            --text-main: #ffffff;
            --text-muted: #aaa;
            --positive: #28a745;
            --negative: #dc3545;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 250px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-left: 5px solid #555;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card.total { border-left-color: var(--accent-color); }
        .card.positivo { border-left-color: var(--positive); }
        .card.negativo { border-left-color: var(--negative); }
        
        .card h3 { 
            margin-bottom: 10px; 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card .valor { 
            font-size: 1.8rem; 
            font-weight: bold; 
        }
        
        .busca-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid #333;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: #121212;
            border: none;
            padding: 0 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { 
            background: #00cc6e; 
        }

        button:active {
            transform: scale(0.95);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--bg-header);
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr:hover { 
            background-color: #252525; 
        }
        
        .subindo { color: var(--positive); font-weight: bold; }
        .caindo { color: var(--negative); font-weight: bold; }
        
        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--accent-color);
            padding: 50px;
            background: var(--bg-card);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="fas fa-chart-line"></i> Minha Carteira B3 Pro</h1>
        
        <div class="dashboard">
            <div class="card total">
                <h3>Valor Total Atual</h3>
                <div class="valor" id="cardTotal">R$ 0,00</div>
            </div>
            <div class="card" id="cardLucroClasse">
                <h3>Lucro / Prejuízo Bruto</h3>
                <div class="valor" id="cardLucro">R$ 0,00</div>
            </div>
            <div class="card" id="cardRentabilidadeClasse">
                <h3>Rentabilidade Total</h3>
                <div class="valor" id="cardRentabilidade">0,00%</div>
            </div>
        </div>

        <div class="busca-container">
            <input type="text" id="inputBusca" placeholder="Buscar ativo pelo ticker... (Ex: BBAS3)" oninput="filtrarTabela()">
            <button onclick="carregarCarteira()"><i class="fas fa-sync-alt"></i> Atualizar</button>
        </div>

        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i> Buscando ativos da planilha e cotações em tempo real...
        </div>
        
        <div class="table-responsive" id="tabelaContainer" style="display: none;">
            <table id="tabelaAtivos">
                <thead>
                    <tr>
                        <th>Ativo</th>
                        <th>Quantidade</th>
                        <th>Preço Médio</th>
                        <th>Preço Atual (Real-time)</th>
                        <th>Valor Atual</th>
                        <th>Valorização</th>
                        <th>Categoria</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_SCRIPT_B3 = "https://script.google.com/macros/s/AKfycbzGExvIEdtO_zqas6fz9kgNTQ21WePh4Q6sQFBBtMGYZIDVzrHLlxS51gkClrHTIefFaA/exec";

        let todosOsDados = [];

        async function carregarCarteira() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tabelaContainer').style.display = 'none';
            
            try {
                const urlComCacheBuster = URL_SCRIPT_B3 + "?_cb=" + new Date().getTime();
                
                const resposta = await fetch(urlComCacheBuster, {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const dados = await resposta.json();
                
                if(dados.erro) {
                    alert("Erro no script da planilha: " + dados.erro);
                    document.getElementById('loading').innerText = "Erro: " + dados.erro;
                    return;
                }

                document.getElementById('cardTotal').innerText = dados.total_carteira;
                document.getElementById('cardLucro').innerText = dados.lucro_prejuizo;
                document.getElementById('cardRentabilidade').innerText = dados.percentual_total;
                
                const cardL = document.getElementById('cardLucroClasse');
                const cardR = document.getElementById('cardRentabilidadeClasse');
                if(dados.lucro_prejuizo_classe === "positivo") {
                    cardL.className = "card positivo";
                    cardR.className = "card positivo";
                } else {
                    cardL.className = "card negativo";
                    cardR.className = "card negativo";
                }

                todosOsDados = dados.ativos;
                montarTabela(todosOsDados);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tabelaContainer').style.display = 'block';
                
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "<i class='fas fa-exclamation-triangle' style='color:#dc3545'></i> Erro ao conectar com o servidor da B3 ou ler a planilha.<br><small style='color:#777; font-size:0.8rem;'>Certifique-se de que a implantação está configurada para acesso de 'Todos'.</small>";
            }
        }

        function montarTabela(listaAtivos) {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";
            
            if (listaAtivos.length === 0) {
                corpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color: #777;">Nenhum ativo encontrado.</td></tr>`;
                return;
            }
            
            listaAtivos.forEach(ativo => {
                const tr = document.createElement('tr');
                const classePreco = ativo[5].includes('-') ? 'caindo' : 'subindo';
                
                tr.innerHTML = `
                    <td><strong>${ativo[0]}</strong></td>
                    <td>${ativo[1]}</td>
                    <td>${ativo[2]}</td>
                    <td>${ativo[3]}</td>
                    <td>${ativo[4]}</td>
                    <td class="${classePreco}">${ativo[5]}</td>
                    <td>${ativo[6]}</td>
                `;
                corpo.appendChild(tr);
            });
        }

        function filtrarTabela() {
            const termo = document.getElementById('inputBusca').value.trim().toUpperCase();
            if(!termo) {
                montarTabela(todosOsDados);
            } else {
                const filtrados = todosOsDados.filter(item => item[0].includes(termo));
                montarTabela(filtrados);
            }
        }

        window.onload = carregarCarteira;
    </script>
</body>
</html>
