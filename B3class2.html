<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consolidador de Carteira - B3</title>
    
    <!-- Configurações PWA Premium para Android e iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Ícones e Fontes (Padrão Premium) -->
    <link rel="icon" type="image/x-icon" href="b3.ico">
    <link rel="apple-touch-icon" href="b3.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #141414;
            --bg-card: #181818;
            --bg-header: #000000;
            --border-color: #333333;
            --accent-color: #00ff88;
            --text-main: #ffffff;
            --text-muted: #808080;
            --positive: #46d369;
            --negative: #e50914;
        }

        /* Reset e Estilos Base Mobile-First */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 30px;
        }

        /* Header Fixo Premium */
        header {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(20, 20, 20, 0.8);
            height: 70px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 900;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 1.1rem;
            color: var(--text-main);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 i {
            color: var(--accent-color);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Grid de Cards (Igual ao estilo do Menu) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 4px;
            padding: 20px;
            position: relative;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .card.total { border-bottom-color: var(--accent-color); }
        .card.positivo { border-bottom-color: var(--positive); }
        .card.negativo { border-bottom-color: var(--negative); }
        
        .card h3 { 
            margin-bottom: 8px; 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card .valor { 
            font-size: 1.8rem; 
            font-weight: bold; 
        }

        /* Área de Busca e Ações */
        .busca-container {
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 0 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Tabela Responsiva Estilizada */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        th {
            background-color: #000;
            color: var(--accent-color);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        tr:hover { 
            background-color: rgba(255,255,255,0.03); 
        }
        
        .subindo { color: var(--positive); font-weight: bold; }
        .caindo { color: var(--negative); font-weight: bold; }
        
        /* Feedback de Loading */
        #loading {
            text-align: center;
            font-size: 1rem;
            color: var(--accent-color);
            padding: 40px;
            background: var(--bg-card);
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Ajustes finos para Mobile */
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; gap: 15px; }
            header { padding: 0 15px; }
            .container { padding: 15px; }
            input[type="text"] { padding: 12px; font-size: 0.9rem; }
            button { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-chart-line"></i> Carteira B3 Pro</h1>
        <div class="user-profile">
            <span style="font-size: 0.85rem; color: var(--text-muted);">Live-Feed <i class="fas fa-circle" style="color: var(--accent-color); font-size: 0.6rem; margin-left: 3px;"></i></span>
        </div>
    </header>

    <div class="container">
        
        <div class="dashboard-grid">
            <div class="card total">
                <h3>Valor Total Atual</h3>
                <div class="valor" id="cardTotal">R$ 0,00</div>
            </div>
            <div class="card" id="cardLucroClasse">
                <h3>Lucro / Prejuízo Bruto</h3>
                <div class="valor" id="cardLucro">R$ 0,00</div>
            </div>
            <div class="card" id="cardRentabilidadeClasse">
                <h3>Rentabilidade Total</h3>
                <div class="valor" id="cardRentabilidade">0,00%</div>
            </div>
        </div>

        <div class="busca-container">
            <input type="text" id="inputBusca" placeholder="Filtrar ativo... (Ex: BBAS3)" oninput="filtrarTabela()">
            <button onclick="carregarCarteira()"><i class="fas fa-sync-alt"></i></button>
        </div>

        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i> Sincronizando dados em tempo real...
        </div>
        
        <div class="table-responsive" id="tabelaContainer" style="display: none;">
            <table id="tabelaAtivos">
                <thead>
                    <tr>
                        <th>Ativo</th>
                        <th>Qtd</th>
                        <th>P. Médio</th>
                        <th>Preço Atual</th>
                        <th>Valor Total</th>
                        <th>Var. (%)</th>
                        <th>Categoria</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_SCRIPT_B3 = "https://script.google.com/macros/s/AKfycbzGExvIEdtO_zqas6fz9kgNTQ21WePh4Q6sQFBBtMGYZIDVzrHLlxS51gkClrHTIefFaA/exec";
        let todosOsDados = [];

        async function carregarCarteira() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tabelaContainer').style.display = 'none';
            
            try {
                const urlComCacheBuster = URL_SCRIPT_B3 + "?_cb=" + new Date().getTime();
                const resposta = await fetch(urlComCacheBuster, { method: 'GET', redirect: 'follow' });
                const dados = await resposta.json();
                
                if(dados.erro) {
                    document.getElementById('loading').innerText = "Erro: " + dados.erro;
                    return;
                }

                document.getElementById('cardTotal').innerText = dados.total_carteira;
                document.getElementById('cardLucro').innerText = dados.lucro_prejuizo;
                document.getElementById('cardRentabilidade').innerText = dados.percentual_total;
                
                const cardL = document.getElementById('cardLucroClasse');
                const cardR = document.getElementById('cardRentabilidadeClasse');
                if(dados.lucro_prejuizo_classe === "positivo") {
                    cardL.className = "card positivo";
                    cardR.className = "card positivo";
                } else {
                    cardL.className = "card negativo";
                    cardR.className = "card negativo";
                }

                todosOsDados = dados.ativos;
                montarTabela(todosOsDados);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tabelaContainer').style.display = 'block';
                
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "<i class='fas fa-exclamation-triangle' style='color:#e50914'></i> Erro na sincronização.";
            }
        }

        function montarTabela(listaAtivos) {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";
            
            if (listaAtivos.length === 0) {
                corpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color: #777;">Nenhum ativo encontrado.</td></tr>`;
                return;
            }
            
            listaAtivos.forEach(ativo => {
                const tr = document.createElement('tr');
                const classePreco = ativo[5].includes('-') ? 'caindo' : 'subindo';
                
                tr.innerHTML = `
                    <td><strong>${ativo[0]}</strong></td>
                    <td>${ativo[1]}</td>
                    <td>${ativo[2]}</td>
                    <td>${ativo[3]}</td>
                    <td>${ativo[4]}</td>
                    <td class="${classePreco}">${ativo[5]}</td>
                    <td><span style="font-size:0.8rem; color:#808080;">${ativo[6]}</span></td>
                `;
                corpo.appendChild(tr);
            });
        }

        function filtrarTabela() {
            const termo = document.getElementById('inputBusca').value.trim().toUpperCase();
            if(!termo) {
                montarTabela(todosOsDados);
            } else {
                const filtrados = todosOsDados.filter(item => item[0].includes(termo));
                montarTabela(filtrados);
            }
        }

        window.onload = carregarCarteira;
    </script>
</body>
</html>
