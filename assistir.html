<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (localStorage.getItem('acesso_cnh') !== 'true') {
            // Se não estiver logado, manda para o login que está na pasta anterior ou raiz
            window.location.href = 'login.html'; 
        }
    </script>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - CNH Blindada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; background: #1e293b; display: flex; align-items: center; justify-content: space-between; }
        .btn-voltar { color: #94a3b8; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .video-wrapper { width: 100%; max-width: 1100px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        footer { padding: 20px; background: #1e293b; text-align: center; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-concluir { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-simulado { background: #fbbf24; color: #000; text-decoration: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 1rem; display: none; transition: 0.3s; }
        .btn-simulado:hover { background: #d9a306; }
    </style>
</head>
<body>

    <header>
        <a href="listas_gravadas.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar para Lista</a>
        <h2 id="aula-nome" style="font-size: 1rem; margin: 0;">Carregando...</h2>
    </header>

    <div class="container">
        <div class="video-wrapper" id="player"></div>
    </div>

    <footer>
        <a id="link-simulado" href="#" class="btn-simulado">
            <i class="fas fa-file-alt"></i> Fazer Simulado desta Aula
        </a>
        <button class="btn-concluir" onclick="marcarConcluida()">Marcar Aula como Concluída ✅</button>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('id');
        const aulaId = params.get('aula');
        const titulo = params.get('title');
        const simuladoUrl = params.get('simulado');

        document.getElementById('aula-nome').innerText = titulo;
        document.getElementById('player').innerHTML = `
            <iframe src="https://www.youtube-nocookie.com/embed/${videoId}?rel=0&autoplay=1" allowfullscreen allow="autoplay"></iframe>
        `;

        if (simuladoUrl && simuladoUrl !== "" && simuladoUrl !== "null") {
            const btnSimulado = document.getElementById('link-simulado');
            btnSimulado.href = simuladoUrl;
            btnSimulado.style.display = "inline-block";
        }

        function marcarConcluida() {
            localStorage.setItem(aulaId, 'sim');
            alert("Aula marcada como concluída!");
            window.location.href = 'listas_gravadas.html';
        }
    </script>
</body>
</html>
