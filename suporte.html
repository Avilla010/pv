<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (localStorage.getItem('acesso_cnh') !== 'true') {
            // Se não estiver logado, manda para o login que está na pasta anterior ou raiz
            window.location.href = 'login.html'; 
        }
    </script>        
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - CNH Blindada</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #fbbf24;
            --bg-body: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background-color: var(--bg-body); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .support-card {
            background: #fff;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .icon-header {
            width: 80px;
            height: 80px;
            background: #fff9e6;
            color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
        }

        h1 { color: var(--primary-color); font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; line-height: 1.5; }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #25d366; /* Cor oficial WhatsApp */
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
            filter: brightness(1.1);
        }

        .info-extra {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="support-card">
        <div class="icon-header">
            <i class="fas fa-headset"></i>
        </div>
        
        <h1>SOS Aluno</h1>
        <p>Está com alguma dúvida ou dificuldade técnica? Nossa equipe de suporte está pronta para te ajudar agora mesmo via WhatsApp.</p>

        <a href="https://w.app/nparqq" target="_blank" class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i> Falar com Suporte
        </a>

        <div class="info-extra">
            Atendimento de Segunda a Sexta, das 08h às 18h.
        </div>
    </div>

</body>
</html>
