<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Premium | Rodolfo Gameplay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-green: #00ff66;
            --bg-dark: #050505;
            --card-bg: #141414;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Roboto', sans-serif; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- CARD EM BREVE --- */
        .coming-soon-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-bottom: 3px solid var(--primary-green);
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 255, 102, 0.05);
        }

        .coming-soon-card i {
            font-size: 3.5rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }

        .coming-soon-card h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .coming-soon-card p {
            color: #aaa;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .badge-status {
            display: inline-block;
            background: rgba(0, 255, 102, 0.1);
            color: var(--primary-green);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 102, 0.3);
        }

        /* --- RESPONSIVIDADE (MOBILE / ANDROID) --- */
        @media (max-width: 768px) {
            body { 
                padding: 20px 15px; 
                min-height: auto;
            }
            .coming-soon-card {
                padding: 35px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- CONTEÚDO PRINCIPAL (MENSAGEM EM BREVE) -->
    <div class="coming-soon-card">
        <i class="fas fa-store"></i>
        <h1>EM BREVE!</h1>
        <p>Estamos preparando a nossa <strong>Loja Premium</strong> com as melhores recomendações de equipamentos, controles e pendrives para o seu PS2.</p>
        <span class="badge-status"><i class="fas fa-tools"></i> Em Desenvolvimento</span>
    </div>

</body>
</html>
