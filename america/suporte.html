<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - CNH Blindada Originals</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-card: #181818;
            --whatsapp-green: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body { 
            background-color: var(--netflix-black); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            color: #fff;
        }

        .support-card {
            background: var(--netflix-card);
            max-width: 500px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-bottom: 4px solid var(--netflix-red);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de luz sutil no fundo */
        .support-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .icon-header {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--netflix-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin: 0 auto 25px;
            border: 2px solid rgba(229, 9, 20, 0.2);
            transition: 0.3s;
        }

        .support-card:hover .icon-header {
            transform: scale(1.1);
            background: var(--netflix-red);
            color: #fff;
            border-color: var(--netflix-red);
        }

        h1 { 
            color: #fff; 
            font-size: 1.8rem; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p { 
            color: #a3a3a3; 
            margin-bottom: 35px; 
            line-height: 1.6; 
            font-size: 1rem;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #fff; 
            color: #000;
            text-decoration: none;
            padding: 20px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-whatsapp:hover {
            background-color: var(--netflix-red);
            color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .info-extra {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #222;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--whatsapp-green);
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 10px var(--whatsapp-green);
        }

        @media (max-width: 480px) {
            .support-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="support-card">
        <div class="icon-header">
            <i class="fas fa-headset"></i>
        </div>
        
        <h1>Central de Ajuda</h1>
        <p>Precisa de suporte técnico ou tem dúvidas sobre as aulas? Nossa equipe está online para garantir sua aprovação.</p>

        <a href="https://wa.me/5535998781881?text=Olá!%20Gostaria%20de%20tirar%20uma%20dúvida%20sobre%20o%20aplicativo%20CNH%20Blindada." target="_blank" class="btn-whatsapp">
            <i class="fab fa-whatsapp" style="font-size: 1.4rem;"></i> Chamar no WhatsApp
        </a>

        <div class="info-extra">
            <span class="status-dot"></span> Disponível: Seg a Sex • 08h - 18h
        </div>
    </div>

</body>
</html>
