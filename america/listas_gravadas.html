<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNH Blindada - Aulas Obrigatórias</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* ESTÉTICA NETFLIX ORIGINALS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body { 
            background-color: #141414; /* Preto Netflix */
            color: #fff; 
            padding: 40px 4%; 
            overflow-x: hidden;
        }

        .header-section { 
            margin-bottom: 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
        }

        .header-section h2 { font-size: 2rem; color: #E50914; text-transform: uppercase; letter-spacing: 1px; }
        .header-section p { color: #a3a3a3; margin-top: 5px; }

        /* GRID ESTILO CATÁLOGO */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px 20px; 
        }

        .video-card { 
            background: #181818; 
            border-radius: 4px; 
            overflow: hidden; 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            border-bottom: 3px solid transparent;
        }

        /* EFEITO ZOOM NETFLIX */
        .video-card:hover { 
            transform: scale(1.08); 
            z-index: 10;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            border-color: #E50914;
        }

        .thumbnail { 
            width: 100%; 
            height: 160px; 
            background-size: cover; 
            background-position: center; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Ícone de Play central que aparece no hover */
        .thumbnail i { 
            color: #fff; 
            font-size: 3rem; 
            z-index: 2;
            opacity: 0;
            transition: 0.3s;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .video-card:hover .thumbnail i { opacity: 0.9; }

        .video-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }

        .video-title { 
            font-size: 1rem; 
            font-weight: 700; 
            margin-bottom: 10px; 
            color: #fff;
            height: 40px;
            overflow: hidden;
        }

        /* BARRA DE PROGRESSO VERMELHA (ESTILO "CONTINUAR ASSISTINDO") */
        .progress-container { 
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.2); 
            height: 4px; 
            z-index: 5;
        }
        .progress-bar { height: 100%; transition: 1s ease; }
        .bg-pendente { background: #555; }
        .bg-concluido { background: #E50914; box-shadow: 0 0 10px #E50914; }

        .progress-text { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 700;
            margin-bottom: 12px;
        }
        .text-pendente { color: #808080; }
        .text-concluido { color: #46d369; } /* Verde para concluído */

        .btn-play { 
            width: 100%; 
            padding: 10px; 
            background: #fff; 
            color: #000; 
            text-align: center; 
            font-size: 0.8rem; 
            font-weight: 700; 
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.2s;
            margin-top: auto;
        }

        .video-card:hover .btn-play { background: #E50914; color: #fff; }

        .btn-reset { 
            background: transparent; 
            color: #555; 
            border: 1px solid #555; 
            padding: 8px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 0.75rem; 
            transition: 0.3s;
        }
        .btn-reset:hover { border-color: #fff; color: #fff; }

        @media (max-width: 768px) {
            .video-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .header-section h2 { font-size: 1.4rem; }
            .thumbnail { height: 120px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div>
            <h2>AULAS <span style="font-weight: 400; color: #fff;">OBRIGATÓRIAS</span></h2>
            <p>Sua maratona rumo à Carteira de Habilitação.</p>
        </div>
        <button class="btn-reset" onclick="resetProgress()">Zerar Histórico</button>
    </div>

    <div class="video-grid" id="grid-aulas"></div>

    <script>
        const aulas = [
            { id: 'aula01', titulo: '01 - Processo de Habilitação', yt: 'oe0ZXYg63uE', simulado: 'simulado01.html' },
            { id: 'aula02', titulo: '02 - Sinalização de Trânsito', yt: 'bNnr291TaIA', simulado: 'simulado02.html' },
            { id: 'aula03', titulo: '03 - Normas de Circulação', yt: 'veoWUKYvGYs', simulado: 'simulado03.html' },
            { id: 'aula04', titulo: '04 - Penalidades e Crimes', yt: 'dM0bJq--4vk', simulado: 'simulado04.html' },
            { id: 'aula05', titulo: '05 - Direção Defensiva', yt: '1xvY6PIyrwY', simulado: 'simulado05.html' },
            { id: 'aula06', titulo: '06 - Primeiros Socorros', yt: 'cKWwEOkASw4', simulado: 'simulado06.html' },
            { id: 'aula07', titulo: '07 - Meio Ambiente e Cidadania', yt: 'XEiVKViHUe0', simulado: 'simulado07.html' },
            { id: 'aula08', titulo: '08 - Mecânica Básica', yt: 'koQ-yQGLSBA', simulado: 'simulado08.html' }
        ];

        let intervaloCronometro;

        function acessarAula(index) {
            const aulaAtual = aulas[index];
            const proximaAula = aulas[index + 1];

            // Ativa o cronômetro para a próxima aula
            if (proximaAula && !localStorage.getItem('liberacao_' + proximaAula.id)) {
                const dataLiberacao = new Date().getTime(); 
                localStorage.setItem('liberacao_' + proximaAula.id, dataLiberacao);
            }

            render();

            const videoUrl = `assistir.html?id=${aulaAtual.yt}&aula=${aulaAtual.id}&title=${encodeURIComponent(aulaAtual.titulo)}&simulado=${aulas[index].simulado || ''}`;
            setTimeout(() => {
                window.location.href = videoUrl;
            }, 1000); 
        }

        function render() {
            // Limpa o intervalo antigo para evitar múltiplos cronômetros rodando juntos
            clearInterval(intervaloCronometro);

            const grid = document.getElementById('grid-aulas');
            grid.innerHTML = '';
            const agora = new Date().getTime();

            aulas.forEach((a, index) => {
                const feito = localStorage.getItem(a.id) === 'sim';
                const thumbnailUrl = `https://img.youtube.com/vi/${a.yt}/maxresdefault.jpg`;
                
                let liberada = (index === 0); 
                let textoStatus = liberada ? (feito ? '● Finalizado' : 'Continuar Assistindo') : '';
                let textoBotao = 'Assistir';
                let idStatusRegressivo = `status-${a.id}`; // ID único para atualizar via JavaScript depois

                const numeroAulaAnterior = index > 0 ? aulas[index - 1].titulo.split(' - ')[0] : '';

                if (!liberada) {
                    const timestampLiberacao = localStorage.getItem('liberacao_' + a.id);
                    
                    if (timestampLiberacao) {
                        const tempoNecessario = 16 * 60 * 60 * 1000; // 16 horas
                        const dataAlvo = parseInt(timestampLiberacao) + tempoNecessario;

                        if (agora >= dataAlvo) {
                            liberada = true;
                            textoStatus = feito ? '● Finalizado' : 'Continuar Assistindo';
                            textoBotao = 'Assistir';
                        } else {
                            // Texto provisório que será substituído instantaneamente pelo cronômetro ativo
                            textoStatus = `🔒 Calculando tempo...`;
                            textoBotao = `Após Aula ${numeroAulaAnterior}`;
                        }
                    } else {
                        textoStatus = `🔒 Assista a aula ${numeroAulaAnterior} primeiro`;
                        textoBotao = `Após Aula ${numeroAulaAnterior}`;
                    }
                }

                const clickAcao = liberada ? `onclick="acessarAula(${index})"` : `onclick="alert('Você precisa aguardar o tempo de liberação da aula anterior!')"`;
                const estiloBloqueado = liberada ? "" : "style='opacity: 0.35; cursor: not-allowed; filter: grayscale(90%);'";
                const classeTextoStatus = liberada ? (feito ? 'text-concluido' : 'text-pendente') : 'text-pendente';

                grid.innerHTML += `
                    <div class="video-card" ${clickAcao} ${estiloBloqueado}>
                        <div class="thumbnail" style="background-image: url('${thumbnailUrl}')">
                            ${liberada ? '<i class="fas fa-play"></i>' : '<i class="fas fa-lock" style="font-size: 2.5rem; opacity: 0.7;"></i>'}
                            <div class="progress-container">
                                <div class="progress-bar ${feito ? 'bg-concluido' : 'bg-pendente'}" 
                                     style="width: ${feito ? '100%' : '20%'}"></div>
                            </div>
                        </div>
                        <div class="video-info">
                            <span id="${idStatusRegressivo}" class="progress-text ${classeTextoStatus}">
                                ${textoStatus}
                            </span>
                            <h3 class="video-title">${a.titulo}</h3>
                            <div class="btn-play">${textoBotao}</div>
                        </div>
                    </div>
                `;
            });

            // Inicia a função que atualiza a contagem a cada 1 segundo na tela
            atualizarCronometros();
            intervaloCronometro = setInterval(atualizarCronometros, 1000);
        }

        function atualizarCronometros() {
            const agora = new Date().getTime();
            let precisaRemontar = false;

            aulas.forEach((a, index) => {
                if (index === 0) return; // Ignora a primeira aula

                const timestampLiberacao = localStorage.getItem('liberacao_' + a.id);
                if (timestampLiberacao) {
                    const tempoNecessario = 16 * 60 * 60 * 1000; 
                    const dataAlvo = parseInt(timestampLiberacao) + tempoNecessario;
                    const diferenca = dataAlvo - agora;

                    const elementoStatus = document.getElementById(`status-${a.id}`);

                    if (diferenca <= 0) {
                        // O tempo acabou enquanto o usuário olhava a página!
                        precisaRemontar = true;
                    } else if (elementoStatus) {
                        // Transforma os milissegundos restantes em Horas, Minutos e Segundos
                        const horas = Math.floor(diferenca / (1000 * 60 * 60));
                        const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
                        const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);

                        // Formata para colocar o zero à esquerda quando menor que 10 (ex: 05 em vez de 5)
                        const hTexto = horas.toString().padStart(2, '0');
                        const mTexto = minutos.toString().padStart(2, '0');
                        const sTexto = segundos.toString().padStart(2, '0');

                        elementoStatus.innerHTML = `🔒 Libera em ${hTexto}:${mTexto}:${sTexto}`;
                    }
                }
            });

            // Se alguma aula acabou de desbloquear, reconstrói o visual da página para liberar o botão
            if (precisaRemontar) {
                render();
            }
        }

        function resetProgress() {
            if(confirm("Deseja apagar seu histórico e bloquear as próximas aulas novamente?")) { 
                aulas.forEach(a => {
                    localStorage.removeItem(a.id);
                    localStorage.removeItem('liberacao_' + a.id);
                }); 
                render(); 
            }
        }
        
        render();
    </script>
</body>
</html>
