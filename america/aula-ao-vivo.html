<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Ao Vivo - CNH Blindada</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-dark-grey: #181818;
            --netflix-grey: #808080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body { 
            background-color: var(--netflix-black); 
            padding: 40px 20px; 
            color: #fff; 
            overflow-y: auto; 
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .live-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .live-badge {
            background: var(--netflix-red);
            color: white;
            padding: 6px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* BOTÃO DE INSCRIÇÃO ÚNICO */
        .interaction-bar {
            margin-top: 20px;
        }

        .btn-sub {
            display: flex;
            width: 100%;
            padding: 18px;
            background-color: var(--netflix-red);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 4px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.2);
        }

        .btn-sub:hover { 
            background-color: #ff0a16; 
            transform: scale(1.01);
            filter: brightness(1.1);
        }

        .live-info {
            background: var(--netflix-dark-grey);
            margin-top: 20px;
            padding: 25px;
            border-radius: 4px;
            border-left: 4px solid var(--netflix-red);
        }

        .live-info h2 { font-size: 1.4rem; color: #fff; margin-bottom: 10px; }
        .live-info p { color: var(--netflix-grey); line-height: 1.5; font-size: 0.95rem; }

        @media (max-width: 768px) {
            .live-header { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="live-header">
            <div>
                <span style="color: var(--netflix-red); font-weight: bold; font-size: 0.7rem; letter-spacing: 2px;">ORIGINAL CNH BLINDADA</span>
                <h1 style="font-size: 1.8rem; margin-top: 5px;">Aulas Ao Vivo</h1>
            </div>
            <div class="live-badge">
                <i class="fas fa-circle"></i> EM TRANSMISSÃO
            </div>
        </div>

        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/9N6A7EKkqy8" 
                title="Aula Ao Vivo" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- BOTÃO DE INSCRIÇÃO DIRETO -->
        <div class="interaction-bar">
            <a href="https://www.youtube.com/@CNHBlindadaMG?sub_confirmation=1" target="_blank" class="btn-sub">
                <i class="fas fa-bell"></i> INSCREVER-SE NO CANAL AGORA
            </a>
        </div>

        <div class="live-info">
            <h2>Próxima Aula: Estratégias de Prova DETRAN</h2>
            <p>Assista à mentoria completa com as principais pegadinhas do Detran. Participe do chat exclusivo para tirar suas dúvidas em tempo real com nossos instrutores.</p>
        </div>
    </div>

</body>
</html>
