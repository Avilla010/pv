<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Vertical - CNH Blindada</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-dark-grey: #181818;
            --netflix-grey: #808080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body { 
            background-color: var(--netflix-black); 
            padding: 20px; 
            color: #fff; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%;
            max-width: 450px; /* Largura máxima para não ficar gigante no PC */
            margin: 0 auto; 
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-section span {
            color: var(--netflix-red);
            font-weight: bold;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        /* --- FORMATO TIKTOK (9:16) --- */
        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; /* Proporção 1080x1920 (9:16) */
            height: 0;
            background: #000;
            border-radius: 12px; /* Bordas arredondadas estilo App */
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .btn-sub {
            display: flex;
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            background-color: var(--netflix-red);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-sub:hover { 
            background-color: #ff0a16; 
            transform: translateY(-2px);
        }

        .info-box {
            margin-top: 20px;
            text-align: center;
        }

        .info-box h2 { font-size: 1.2rem; margin-bottom: 8px; }
        .info-box p { color: var(--netflix-grey); font-size: 0.9rem; line-height: 1.4; }

    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <span>DICAS RÁPIDAS</span>
            <h1 style="font-size: 1.5rem;">Shorts CNH Blindada</h1>
        </div>

        <!-- PLAYER EM FORMATO VERTICAL (TIKTOK) -->
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed?listType=playlist&list=PLeDyOxg2FUYjMjjGnrIqPfLsmXod7UPRC" 
                title="Shorts Playlist" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <a href="https://www.youtube.com/@CNHBlindadaMG?sub_confirmation=1" target="_blank" class="btn-sub">
            <i class="fas fa-bell"></i> SE INSCREVER NO CANAL
        </a>

        <div class="info-box">
            <h2>Maratona de Shorts</h2>
            <p>Toque no ícone de lista no topo do vídeo para ver todos os vídeos da playlist.</p>
        </div>
    </div>

</body>
</html>
