<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado 05 - Mecânica Básica | CNH Blindada</title>
    <link rel="icon" href="favicon.png" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-card: #181818;
            --success: #46d369; 
            --danger: #e50914; 
            --text: #fff; 
        }
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background: var(--netflix-black); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 800px; 
            background: transparent;
        }

        /* --- HEADER --- */
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-voltar { 
            text-decoration: none; 
            color: #a3a3a3; 
            font-size: 0.9rem; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            transition: 0.3s;
        }
        .btn-voltar:hover { color: #fff; }

        h1 { color: #fff; font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* --- STATS --- */
        .stats-bar { 
            display: none; 
            justify-content: space-around; 
            background: var(--netflix-card); 
            padding: 20px; 
            border-radius: 4px; 
            margin-bottom: 25px; 
            font-weight: bold; 
            border-bottom: 2px solid #333;
        }

        /* --- QUIZ SECTION --- */
        .quiz-section { 
            background: var(--netflix-card); 
            padding: 40px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .progress-container { 
            height: 4px; 
            background: #333; 
            margin-bottom: 30px; 
            display: none; 
        }
        .progress-fill { height: 100%; background: var(--netflix-red); width: 0%; transition: 0.6s; }
        
        .question-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; line-height: 1.4; color: #fff; }
        
        .option { 
            display: block; 
            padding: 18px; 
            margin: 12px 0; 
            border: 1px solid #333; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: 0.2s; 
            background: rgba(255,255,255,0.02);
        }
        .option:hover { background: rgba(255,255,255,0.08); }
        .option input { margin-right: 15px; accent-color: var(--netflix-red); }

        .option.correct { background: rgba(70, 211, 105, 0.2) !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .option.wrong { background: rgba(229, 9, 20, 0.2) !important; border-color: var(--danger) !important; }
        .option.disabled { pointer-events: none; }

        .btn-action { 
            width: 100%; 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 4px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 20px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-action:hover { background: var(--netflix-red); color: #fff; }
        .btn-next-step { background: var(--netflix-red); color: #fff; }

        #result-area { text-align: center; display: none; padding: 20px; }
        .score-box { font-size: 4rem; font-weight: 700; margin: 20px 0; color: var(--netflix-red); }
        
        .footer { text-align: center; margin-top: 50px; font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <a href="lista-simulados.html" class="btn-voltar"><i class="fas fa-chevron-left"></i> Voltar</a>
        <h1>Simulado 05</h1>
        <div style="width: 50px;"></div>
    </div>

    <div id="live-stats" class="stats-bar">
        <span style="color:#fff"><i class="far fa-clock"></i> <span id="timer">15:00</span></span>
        <span style="color:var(--success)"><i class="fas fa-check"></i> <span id="count-correct">0</span></span>
        <span style="color:var(--netflix-red)"><i class="fas fa-times"></i> <span id="count-wrong">0</span></span>
    </div>

    <div class="quiz-section">
        <div class="progress-container" id="p-cont"><div class="progress-fill" id="progress"></div></div>
        
        <div id="start-screen" style="text-align:center">
            <div style="background: rgba(255,255,255,0.05); border-left: 4px solid var(--netflix-red); padding: 25px; margin: 20px 0; text-align:left; color:#ccc;">
                <h3 style="color:#fff; margin-bottom:15px">Módulo: Mecânica Básica</h3>
                • Sistemas de lubrificação e arrefecimento<br>
                • Transmissão, suspensão e freios<br>
                • Motor e painel de instrumentos<br>
                • 15 questões | 11 acertos necessários
            </div>
            <button class="btn-action" onclick="startQuiz()">ABRIR O CAPÔ</button>
        </div>

        <div id="quiz-area"></div>

        <div id="result-area">
            <h3>Relatório de Oficina</h3>
            <div id="score-text" class="score-box">0/15</div>
            <p id="feedback-msg" style="font-size: 1.2rem; margin-bottom: 30px;"></p>
            <button class="btn-action" style="margin-bottom: 15px" onclick="location.reload()">Refazer Simulado</button>
            <a href="lista-simulados.html" class="btn-action" style="display:block; text-decoration:none; text-align:center; background: transparent; border: 1px solid #333; color:#fff">Concluir Todos os Módulos</a>
        </div>
    </div>

    <div class="footer">Confia no processo e executa! 🚦✅</div>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
const questions = [
    {
        "q": "O termômetro é utilizado para indicar:",
        "options": ["A temperatura no exterior do veiculo.", "A temperatura no interior do veiculo.", "Alterações na composição do fluido de freio.", "A temperatura do motor."],
        "correct": 3
    },
    {
        "q": "O distribuidor faz parte do sistema:",
        "options": ["Automático.", "Elétrico.", "Transmissão.", "Arrefecimento."],
        "correct": 1
    },
    {
        "q": "Pneus dianteiros com calibragem muito abaixo do normal podem acarretar:",
        "options": ["Desgaste prematuro dos mesmos.", "Estabilidade comprometida.", "Dificuldades nas manobras.", "Todas as opções estão corretas."],
        "correct": 3
    },
    {
        "q": "O tempo do motor no qual a mistura se inflama, chama-se:",
        "options": ["Explosão.", "Admissão.", "Descarga.", "Compressão."],
        "correct": 0
    },
    {
        "q": "A peça que tampa a parte inferior do motor e serve como reservatório e coletor do óleo lubrificante chama-se:",
        "options": ["Pistão.", "Tanque de combustível.", "Cárter.", "Tampão."],
        "correct": 2
    },
    {
        "q": "O conjunto de peças que serve para ligar e desligar a força motriz à caixa de marchas, chama-se:",
        "options": ["Semi-árvore", "Embreagem.", "Volante do motor.", "Diferencial."],
        "correct": 1
    },
    {
        "q": "O filtro de óleo lubrificante do motor tem a função de:",
        "options": ["Tornar o óleo mais fino.", "Manter o nível do óleo.", "Reter as impurezas do óleo.", "Tornar o óleo mais viscoso."],
        "correct": 2
    },
    {
        "q": "O sistema que tem como finalidade diminuir a velocidade ou parar o veículo, chama-se:",
        "options": ["Sistema de freios.", "Sistema de alimentação.", "Sistema de distribuição.", "Sistema de lubrificação."],
        "correct": 0
    },
    {
        "q": "A função da caixa de câmbio é:",
        "options": ["Diminuir o desgaste da embreagem.", "Diminuir o atrito dos pneus com o solo.", "Aumentar ou diminuir o aquecimento do motor.", "Aumentar ou diminuir a força ou a velocidade do veículo."],
        "correct": 3
    },
    {
        "q": "Para que ocorra a combustão interna em um motor, são necessários os seguintes elementos:",
        "options": ["Ar e combustível.", "Combustível e água.", "Água e nitrogênio.", "Combustível e vapor d'água."],
        "correct": 0
    },
    {
        "q": "O sistema que mantém a temperatura do motor, sempre, em condições de funcionamento denomina-se:",
        "options": ["Alimentação.", "Arrefecimento.", "Elétrico.", "Inflamação."],
        "correct": 1
    },
    {
        "q": "Os principais sistemas do veículo são:",
        "options": ["Motor, câmbio, diferencial e freio.", "Motor, embreagem, carda, eixo motriz e semi-árvore.", "Motor, transmissão, direção, suspensão e freio.", "Motor, molas, amortecedores e pneus."],
        "correct": 2
    },
    {
        "q": "Um dos cuidados que se deve ter periodicamente, com o veiculo é:",
        "options": ["Lavar os pneus evitando derrapagens.", "Trocar a água do radiador mensalmente.", "Lavar os tapetes para evitar ferrugem.", "Verificar o nível do óleo do motor."],
        "correct": 3
    },
    {
        "q": "O sistema de lubrificação tem a função de:",
        "options": ["Aquecer as peças móveis do motor.", "Lubrificar as peças móveis do motor, evitando o atrito.", "Reduzir a emissão de gases poluentes.", "Alimentar o atrito e esquentar o motor para obter maior potência."],
        "correct": 1
    },
    {
        "q": "A vela de ignição tem como função:",
        "options": ["Fornecer centelha elétrica na câmara de explosão.", "Aquecer o ar da câmara de explosão.", "Aquecer o combustível.", "Interromper a corrente elétrica."],
        "correct": 0
    }
];

let currentQ = 0;
let score = 0;
let errors = 0;
let answered = false;
let timeLeft = 900; 
let timerInterval;

function startQuiz() {
    document.getElementById('start-screen').style.display = "none";
    document.getElementById('quiz-area').style.display = "block";
    document.getElementById('live-stats').style.display = "flex";
    document.getElementById('p-cont').style.display = "block";
    renderQuestion();
    startTimer();
}

function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerHTML = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            showFinalResult();
        }
    }, 1000);
}

function renderQuestion() {
    answered = false;
    const area = document.getElementById('quiz-area');
    const q = questions[currentQ];
    
    area.innerHTML = `
        <span class="question-text">${currentQ + 1}. ${q.q}</span>
        <div id="options-container">
            ${q.options.map((opt, i) => `
                <label class="option" id="opt-${i}">
                    <input type="radio" name="quiz_opt" value="${i}"> ${opt}
                </label>
            `).join('')}
        </div>
        <button id="btn-quiz" class="btn-action" onclick="handleButtonClick()">Verificar Resposta</button>
    `;
    document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + "%";
}

function handleButtonClick() {
    if (!answered) checkAnswer();
    else nextQuestion();
}

function checkAnswer() {
    const selected = document.querySelector('input[name="quiz_opt"]:checked');
    if (!selected) return;
    
    answered = true;
    const userChoice = parseInt(selected.value);
    const correctChoice = questions[currentQ].correct;
    
    document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
    
    if (userChoice === correctChoice) {
        score++;
        document.getElementById('count-correct').innerHTML = score;
        document.getElementById(`opt-${userChoice}`).classList.add('correct');
        document.getElementById('snd-correct').play().catch(()=>{});
    } else {
        errors++;
        document.getElementById('count-wrong').innerHTML = errors;
        document.getElementById(`opt-${userChoice}`).classList.add('wrong');
        document.getElementById(`opt-${correctChoice}`).classList.add('correct');
        document.getElementById('snd-wrong').play().catch(()=>{});
    }
    
    const btn = document.getElementById('btn-quiz');
    btn.innerHTML = "Próxima Questão";
    btn.classList.add('btn-next-step');
}

function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) {
        renderQuestion();
    } else {
        showFinalResult();
    }
}

function showFinalResult() {
    clearInterval(timerInterval);
    document.getElementById('quiz-area').style.display = "none";
    document.getElementById('live-stats').style.display = "none";
    document.getElementById('p-cont').style.display = "none";
    document.getElementById('result-area').style.display = "block";
    
    document.getElementById('score-text').innerHTML = `${score}/${questions.length}`;
    document.getElementById('feedback-msg').innerHTML = score >= 11 ? "🏆 MOTOR REGULADO! Você domina os componentes do veículo." : "⚠️ FALHA NO SISTEMA! Revise as funções do Cárter e da Embreagem.";
}
</script>
</body>
</html>
