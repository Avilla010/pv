<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado 03 Especial - 30 Questões | CNH Blindada</title>
    <link rel="icon" href="favicon.png" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-card: #181818;
            --success: #46d369; 
            --danger: #e50914; 
            --text: #fff; 
        }
        
        body { font-family: 'Roboto', sans-serif; background: var(--netflix-black); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-voltar { text-decoration: none; color: #a3a3a3; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-voltar:hover { color: #fff; }
        h1 { color: #fff; font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .stats-bar { display: none; justify-content: space-around; background: var(--netflix-card); padding: 20px; border-radius: 4px; margin-bottom: 25px; font-weight: bold; border-bottom: 2px solid #333; }
        .quiz-section { background: var(--netflix-card); padding: 40px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .progress-container { height: 4px; background: #333; margin-bottom: 30px; display: none; }
        .progress-fill { height: 100%; background: var(--netflix-red); width: 0%; transition: 0.6s; }
        
        .question-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }
        .option { display: block; padding: 18px; margin: 12px 0; border: 1px solid #333; border-radius: 4px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.02); }
        .option:hover { background: rgba(255,255,255,0.08); }
        .option input { margin-right: 15px; accent-color: var(--netflix-red); }
        .option.correct { background: rgba(70, 211, 105, 0.2) !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .option.wrong { background: rgba(229, 9, 20, 0.2) !important; border-color: var(--danger) !important; }
        .option.disabled { pointer-events: none; }

        .btn-action { width: 100%; background: #fff; color: #000; border: none; padding: 18px; border-radius: 4px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-action:hover { background: var(--netflix-red); color: #fff; }
        
        /* Efeito de pausa no timer */
        .timer-paused { color: #555 !important; opacity: 0.6; }
        .pause-notice { font-size: 0.7rem; display: block; color: var(--success); margin-top: 5px; }

        #result-area { text-align: center; display: none; padding: 20px; }
        .score-box { font-size: 4rem; font-weight: 700; margin: 20px 0; color: var(--netflix-red); }
        .footer { text-align: center; margin-top: 50px; font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <a href="lista-simulados.html" class="btn-voltar"><i class="fas fa-chevron-left"></i> Sair</a>
        <h1>Simulado Especial 30 Questões</h1>
        <div style="width: 50px;"></div>
    </div>

    <div id="live-stats" class="stats-bar">
        <span id="timer-box" style="color:#fff; text-align: center;">
            <i class="far fa-clock"></i> <span id="timer">30:00</span>
            <span id="pause-text" class="pause-notice" style="display:none;">TEMPO PAUSADO</span>
        </span>
        <span style="color:var(--success)"><i class="fas fa-check"></i> <span id="count-correct">0</span></span>
        <span style="color:var(--netflix-red)"><i class="fas fa-times"></i> <span id="count-wrong">0</span></span>
    </div>

    <div class="quiz-section">
        <div class="progress-container" id="p-cont"><div class="progress-fill" id="progress"></div></div>
        
        <div id="start-screen" style="text-align:center">
            <h2 style="margin-bottom: 20px;">Módulo Completo: Penalidades</h2>
            <p>30 Questões | 30 Minutos</p>
            <p style="color: #888; font-size: 0.9rem;">O tempo pausa após cada resposta para você anotar seus erros.</p>
            <button class="btn-action" onclick="startQuiz()">Iniciar Desafio</button>
        </div>

        <div id="quiz-area"></div>

        <div id="result-area">
            <h3>Resultado do Teste</h3>
            <div id="score-text" class="score-box">0/30</div>
            <p id="feedback-msg"></p>
            <button class="btn-action" onclick="location.reload()">Refazer Simulado</button>
        </div>
    </div>
    <div class="footer">CNH Blindada &copy; 2026</div>
</div>

<script>
const questions = [
    { "q": "O condutor infrator será submetido a curso de reciclagem quando:", "options": ["Cassada a sua Carteira Nacional de Habilitação.", "Suspenso o direito de dirigir.", "Cometer duas infrações de natureza média.", "Cometer qualquer infração de natureza grave."], "correct": 1 },
    { "q": "Um condutor força ultrapassagem em pista simples, com linha contínua amarela, obrigando veículos do sentido contrário a desviar para o acostamento. Essa conduta é:", "options": ["Uma manobra permitida.", "Uma infração média.", "Uma infração grave.", "Uma infração gravíssima (10x multa)."], "correct": 3 },
    { "q": "A penalidade de advertência por escrito poderá ser aplicada em infrações de:", "options": ["Natureza leve ou média.", "Natureza grave.", "Natureza gravíssima.", "Em nenhuma hipótese."], "correct": 0 },
    { "q": "São penalidades previstas no CTB, exceto:", "options": ["Multa", "Advertência por escrito", "Apreensão do veículo", "Cassação da CNH"], "correct": 2 },
    { "q": "A suspensão do direito de dirigir ocorrerá em todas as situações abaixo, exceto:", "options": ["Estourar o limite de pontos em 12 meses", "Disputar corrida por espírito de emulação", "Ser multado por infração leve", "Dirigir sob influência de álcool"], "correct": 2 },
    { "q": "Sobre a cassação da CNH, marque a alternativa incorreta:", "options": ["Pode ocorrer por reincidência em infração que gera suspensão", "Ocorre se o condutor for condenado judicialmente por crime de trânsito", "Pode ocorrer se o condutor for flagrado dirigindo com a CNH suspensa", "O simples atraso na renovação da CNH gera cassação automática"], "correct": 3 },
    { "q": "A PPD será cassada se o condutor cometer:", "options": ["Uma infração leve", "Uma infração média", "Uma infração grave ou gravíssima", "Duas infrações leves"], "correct": 2 },
    { "q": "Condutor estacionou o veículo a mais de 50 centímetros da guia da calçada, qual infração ele cometeu:", "options": ["Média", "Grave", "Leve", "Gravíssima"], "correct": 2 },
    { "q": "Não se enquadra como infração que gera suspensão direta, sem somar pontos:", "options": ["Dirigir sob efeito de álcool", "Fugir do local do acidente", "Estacionar em local proibido", "Realizar manobra perigosa"], "correct": 2 },
    { "q": "Sobre o curso de reciclagem, marque a alternativa incorreta:", "options": ["É obrigatório em caso de suspensão do direito de dirigir", "Pode ser exigido após acidente grave com culpa", "É obrigatório em caso de cassação da CNH", "Pode ser exigido por decisão judicial"], "correct": 2 },
    { "q": "Entre as alternativas abaixo, não representa medida administrativa:", "options": ["Remoção do veículo", "Recolhimento do CRLV", "Aplicação de multa", "Retenção do veículo"], "correct": 2 },
    { "q": "O condutor poderá solicitar a conversão da multa em advertência quando:", "options": ["A infração for gravíssima", "A infração for leve ou média e não houver reincidência em 12 meses", "A infração for reincidente", "A infração for grave"], "correct": 1 },
    { "q": "Uma das infrações que resulta diretamente em suspensão do direito de dirigir é:", "options": ["Conduzir com farol queimado", "Estacionar sobre a calçada", "Transpor bloqueio policial", "Usar som automotivo em excesso"], "correct": 2 },
    { "q": "O auto de infração será arquivado automaticamente, exceto:", "options": ["Se for inconsistente ou irregular", "Se não for expedido em até 30 dias", "Se o condutor não tiver sido abordado", "Se houver erro na identificação do veículo"], "correct": 2 },
    { "q": "Qual o prazo máximo para a expedição da notificação da autuação por infração de trânsito?", "options": ["15 dias", "30 dias", "60 dias", "90 dias"], "correct": 1 },
    { "q": "Estacionar o veículo a MAIS DE UM METRO da guia da calçada (meio-fio) é infração:", "options": ["Leve", "Média", "Grave", "Gravíssima"], "correct": 2 },
    { "q": "A pontuação máxima para quem NÃO possui nenhuma infração gravíssima nos últimos 12 meses é de:", "options": ["20 pontos", "30 pontos", "40 pontos", "50 pontos"], "correct": 2 },
    { "q": "Dirigir o veículo manuseando ou segurando o telefone celular é infração:", "options": ["Média", "Grave", "Gravíssima", "Leve"], "correct": 2 },
    { "q": "Transitar em velocidade superior à máxima permitida em mais de 50% é infração:", "options": ["Média", "Grave", "Gravíssima (suspensão direta)", "Leve"], "correct": 2 },
    { "q": "A penalidade aplicada ao condutor que dirige sob efeito de álcool é:", "options": ["Multa 5x e suspensão", "Multa 10x e suspensão por 12 meses", "Apenas multa", "Apenas apreensão da CNH"], "correct": 1 },
    { "q": "Qual medida administrativa é aplicada quando o condutor se recusa a fazer o teste do bafômetro?", "options": ["Multa e retenção do veículo", "Recolhimento da CNH e retenção do veículo", "Cassação imediata", "Nenhuma, pois é um direito"], "correct": 1 },
    { "q": "As medidas administrativas geralmente começam com as letras:", "options": ["A e M", "R e T", "C e S", "P e M"], "correct": 1 },
    { "q": "Deixar o condutor envolvido em acidente com vítima de prestar socorro é:", "options": ["Infração grave", "Crime de trânsito e infração gravíssima", "Infração média", "Apenas falta de ética"], "correct": 1 },
    { "q": "Quando o condutor é flagrado dirigindo com a CNH de categoria diferente da do veículo, comete infração:", "options": ["Grave", "Gravíssima (multa 2x)", "Média", "Leve"], "correct": 1 },
    { "q": "A cassação do documento de habilitação ocorrerá após quanto tempo de suspensão?", "options": ["Imediatamente", "Se dirigir estando suspenso", "Após 2 anos", "Nunca ocorre"], "correct": 1 },
    { "q": "Estacionar sobre ciclovia ou ciclofaixa é infração:", "options": ["Média", "Grave", "Gravíssima", "Leve"], "correct": 1 },
    { "q": "O sinal sonoro de 'Um silvo longo' dado pelo agente de trânsito significa:", "options": ["Atenção, siga", "Pare", "Diminuir a marcha", "Acender lanternas"], "correct": 2 },
    { "q": "Quantos pontos são somados na CNH por uma infração de natureza MÉDIA?", "options": ["3 pontos", "4 pontos", "5 pontos", "7 pontos"], "correct": 1 },
    { "q": "Bloquear a via com o veículo é infração gravíssima com penalidade de multa e:", "options": ["Advertência", "Apreensão do veículo", "Remoção do veículo", "Nenhuma medida"], "correct": 2 },
    { "q": "Dirigir veículo com a validade da CNH vencida há mais de 30 dias é infração:", "options": ["Leve", "Média", "Grave", "Gravíssima"], "correct": 3 }
];

let currentQ = 0;
let score = 0;
let errors = 0;
let answered = false;
let timeLeft = 1800; 
let timerInterval;

function startQuiz() {
    document.getElementById('start-screen').style.display = "none";
    document.getElementById('quiz-area').style.display = "block";
    document.getElementById('live-stats').style.display = "flex";
    document.getElementById('p-cont').style.display = "block";
    renderQuestion();
    startTimer();
}

function startTimer() {
    // Garante que o timer visual resete o estado de pausa
    document.getElementById('timer-box').classList.remove('timer-paused');
    document.getElementById('pause-text').style.display = 'none';

    timerInterval = setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerHTML = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            showFinalResult();
        }
    }, 1000);
}

function renderQuestion() {
    answered = false;
    const area = document.getElementById('quiz-area');
    const q = questions[currentQ];
    area.innerHTML = `
        <span class="question-text">${currentQ + 1}. ${q.q}</span>
        <div id="options-container">
            ${q.options.map((opt, i) => `
                <label class="option" id="opt-${i}">
                    <input type="radio" name="quiz_opt" value="${i}"> ${opt}
                </label>
            `).join('')}
        </div>
        <button id="btn-quiz" class="btn-action" onclick="handleButtonClick()">Verificar Resposta</button>
    `;
    document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + "%";
}

function handleButtonClick() {
    if (!answered) checkAnswer();
    else {
        startTimer(); // Retoma o relógio ao ir para a próxima
        nextQuestion();
    }
}

function checkAnswer() {
    const selected = document.querySelector('input[name="quiz_opt"]:checked');
    if (!selected) return;
    
    // PAUSA O RELÓGIO AQUI
    clearInterval(timerInterval);
    document.getElementById('timer-box').classList.add('timer-paused');
    document.getElementById('pause-text').style.display = 'block';

    answered = true;
    const userChoice = parseInt(selected.value);
    const correctChoice = questions[currentQ].correct;
    document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
    
    if (userChoice === correctChoice) {
        score++;
        document.getElementById('count-correct').innerHTML = score;
        document.getElementById(`opt-${userChoice}`).classList.add('correct');
    } else {
        errors++;
        document.getElementById('count-wrong').innerHTML = errors;
        document.getElementById(`opt-${userChoice}`).classList.add('wrong');
        document.getElementById(`opt-${correctChoice}`).classList.add('correct');
    }
    const btn = document.getElementById('btn-quiz');
    btn.innerHTML = "Próxima Questão <i class='fas fa-play' style='font-size:0.8rem; margin-left:10px'></i>";
}

function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) renderQuestion();
    else showFinalResult();
}

function showFinalResult() {
    clearInterval(timerInterval);
    document.getElementById('quiz-area').style.display = "none";
    document.getElementById('result-area').style.display = "block";
    document.getElementById('score-text').innerHTML = `${score}/30`;
    document.getElementById('feedback-msg').innerHTML = score >= 21 ? "🏆 APROVADO! Excelente desempenho." : "⚠️ REPROVADO! Revise o conteúdo (Mínimo 21 acertos).";
}
</script>
</body>
</html>
