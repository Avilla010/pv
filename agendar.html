<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Aula - Auto escola Digital Campo Belo MG</title>
    
    <link rel="shortcut icon" href="digital.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0f172a; 
            --accent-color: #fbbf24;  
            --bg-body: #f1f5f9;       
            --whatsapp-green: #25d366;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo-login img { max-width: 180px; margin-bottom: 20px; }
        h2 { color: var(--primary-color); margin-bottom: 5px; font-size: 1.5rem; }
        p { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }

        .horarios-alert {
            background-color: #fef3c7;
            border: 1px solid #fde68a;
            color: #92400e;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            background-color: #fff;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        .btn-whatsapp {
            width: 100%;
            padding: 14px;
            background-color: var(--whatsapp-green);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-whatsapp:hover {
            background-color: #128c7e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-login">
            <img src="digital.png" alt="Auro escola Digital Campo Belo MG">
        </div>
        
        <h2>Agendar Aula Online - Pro Aulas 2.0</h2>
        <p>Aulas de 50 minutos (Segunda a Sexta)</p>

        <div class="horarios-alert">
            <i class="fas fa-info-circle"></i> <strong>Blocos de Aula:</strong><br>
            Manhã: 07:00 às 12:00<br>
            Tarde/Noite: 17:00 às 19:30
        </div>

        <div class="input-group">
            <label><i class="fas fa-user"></i> Seu Nome</label>
            <input type="text" id="nome" placeholder="Ex: João Silva">
        </div>

        <div class="input-group">
            <label><i class="fas fa-calendar-alt"></i> Data da Aula</label>
            <input type="date" id="data" onchange="validarFimDeSemana(this)">
        </div>

        <div class="input-group">
            <label><i class="fas fa-clock"></i> Escolha o Horário</label>
            <select id="hora">
                <option value="">Selecione um horário...</option>
                <optgroup label="Turno da Manhã">
                    <option value="07:00 - 07:50">07:00 - 07:50</option>
                    <option value="07:50 - 08:40">07:50 - 08:40</option>
                    <option value="08:40 - 09:30">08:40 - 09:30</option>
                    <option value="09:30 - 10:20">09:30 - 10:20</option>
                    <option value="10:20 - 11:10">10:20 - 11:10</option>
                    <option value="11:10 - 12:00">11:10 - 12:00</option>
                </optgroup>
                <optgroup label="Turno Tarde/Noite">
                    <option value="17:00 - 17:50">17:00 - 17:50</option>
                    <option value="17:50 - 18:40">17:50 - 18:40</option>
                    <option value="18:40 - 19:30">18:40 - 19:30</option>
                </optgroup>
            </select>
        </div>

        <button onclick="enviarWhatsapp()" class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i> Confirmar no WhatsApp
        </button>
    </div>

    <script>
        // Trava para não selecionar datas passadas
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('data').setAttribute('min', hoje);

        // Função para validar se é fim de semana
        function validarFimDeSemana(input) {
            const dataSelecionada = new Date(input.value + 'T00:00:00');
            const diaSemana = dataSelecionada.getDay(); // 0 = Domingo, 6 = Sábado
            if (diaSemana === 0 || diaSemana === 6) {
                alert("Aulas apenas de Segunda a Sexta-feira!");
                input.value = "";
            }
        }

        function enviarWhatsapp() {
            const meuNumero = "5535998781881"; 
            const nome = document.getElementById('nome').value;
            const data = document.getElementById('data').value;
            const hora = document.getElementById('hora').value;

            if(!nome || !data || !hora) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            const dataFormatada = data.split('-').reverse().join('/');

            // Removi os emojis que causavam o erro  e usei caracteres simples para garantir a entrega
            const mensagem = "Olá! Gostaria de agendar uma aula online na plataforma Pro Aulas modelo novo 2.0.\n\n" +
                             "*Nome:* " + nome + "\n" +
                             "*Data:* " + dataFormatada + " (Seg-Sex)\n" +
                             "*Horário:* " + hora;

            const url = "https://wa.me/" + meuNumero + "?text=" + encodeURIComponent(mensagem);
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
